<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Notes - Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/feedback.css">
</head>
<body>
  <div class="form-container">
    <div class="form-header">
      <h1>Witness Notes</h1>
      <p>Did you see something? Write it down.</p>
      <div class="nav-links">
        <a href="index.html">Back</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>

    <div class="form-card">
      <div id="notice"></div>

      <label>Who is this about?</label>
      <select id="who">
        <option value="General">— Just a general note —</option>
      </select>

      <label>What happened?</label>
      <textarea id="note" placeholder="I saw Noah near the lab..."></textarea>

      <div class="btns">
        <button id="send" onclick="sendNote()">Send Evidence</button>
        <button id="reset" onclick="clearMe()">Clear</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/config.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC1bxz29svF9y_5V-8VJz0NaMsIzVOAwhI",
      authDomain: "online-voting-b970f.firebaseapp.com",
      databaseURL: "https://online-voting-b970f-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "online-voting-b970f",
      storageBucket: "online-voting-b970f.firebasestorage.app",
      messagingSenderId: "784746686625",
      appId: "1:784746686625:web:eb6a565d11d7240d48a8e0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function setup() {
      const select = document.getElementById('who');
      suspectOptions.forEach(s => {
        const opt = document.createElement('option');
        opt.value = opt.text = s.name;
        select.appendChild(opt);
      });

      const urlParams = new URLSearchParams(window.location.search);
      const prefill = urlParams.get('option');
      if (prefill) {
        select.value = prefill;
        select.disabled = true;
        document.getElementById('notice').innerText = "Voted for " + prefill + ". Now add your notes!";
      }
    }

    function sendNote() {
      const who = document.getElementById('who').value;
      const note = document.getElementById('note').value;

      if (!note) {
        alert("Enter something first!");
        return;
      }

      db.ref('feedback/').push({
        option: who,
        feedback: note,
        timestamp: Date.now()
      }).then(() => {
        alert("Sent!");
        document.getElementById('note').value = '';
      });
    }

    function clearMe() {
      document.getElementById('note').value = '';
    }

    window.onload = setup;
  </script>
</body>
</html>
