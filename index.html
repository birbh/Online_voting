<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Did It? - Crime Scene Vote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="main-container">
    <div class="top-bar">
      <h1>The Crime Scene</h1>
      <p>Someone's guilty. Look at the files and make your choice.</p>
      <div class="nav-links">
        <a href="feedback.html">Add Evidence</a>
        <a href="admin.html">View Results</a>
      </div>
    </div>

    <div id="votingGrid"></div>
    <div id="errorBox"></div>

    <footer class="footer">
      <p>Real-time updates. No cheating.</p>
    </footer>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/config.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC1bxz29svF9y_5V-8VJz0NaMsIzVOAwhI",
      authDomain: "online-voting-b970f.firebaseapp.com",
      databaseURL: "https://online-voting-b970f-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "online-voting-b970f",
      storageBucket: "online-voting-b970f.firebasestorage.app",
      messagingSenderId: "784746686625",
      appId: "1:784746686625:web:eb6a565d11d7240d48a8e0"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let done = false;

    function renderSuspects() {
      const grid = document.getElementById('votingGrid');
      grid.innerHTML = '';

      suspectOptions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'person-card';
        div.innerHTML = `
          <div class="profile-pic">
            <img src="${s.photoUrl}" alt="${s.name}" onerror="this.src='https://via.placeholder.com/200'">
          </div>
          <div class="info">
            <h3>${s.name}</h3>
            <p><strong>Job:</strong> ${s.role}</p>
            <p>${s.motive}</p>
            <button class="btn-vote" onclick="vote('${s.id}', '${s.name}')">Pick This One</button>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    function vote(id, name) {
      if (done) {
        alert("You already picked someone!");
        return;
      }

      const buttons = document.querySelectorAll('.btn-vote');
      buttons.forEach(b => b.disabled = true);

      database.ref('votes/' + id).transaction(val => {
        return (val || 0) + 1;
      }).then(res => {
        if (res.committed) {
          done = true;
          window.location.href = 'feedback.html?option=' + encodeURIComponent(name);
        }
      }).catch(err => {
        buttons.forEach(b => b.disabled = false);
        console.error(err);
      });
    }

    window.onload = renderSuspects;
  </script>
</body>
</html>
