<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Area - Results</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h1>Admin Login</h1>
      <p>Please enter the secret code.</p>
      <input id="passCode" type="password" placeholder="Passcode here...">
      <button onclick="checkPass()">Enter</button>
      <div id="errorMsg" style="color: red; margin-top: 10px;"></div>
      <p class="security-link-wrap">
        <a class="security-link" href="docs/SECURITY.md" target="_blank" rel="noopener noreferrer">Read security policy to log in(pls read😭)</a>
      </p>
    </div>
  </div>

  <div id="mainContent" style="display: none;">
    <div class="header-section">
      <h1>The Evidence Board</h1>
      <p>Total control over the investigation.</p>
    </div>

    <div class="grid-layout">
      <div class="left-side">
        <div class="stats-box">
          <h2>Current Standings</h2>
          <div id="statsGrid"></div>
          <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
          </div>
        </div>
      </div>

      <div class="right-side">
        <div class="feed-box">
          <h2>Latest Tips</h2>
          <div id="evidenceList"></div>
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="reset-btn" onclick="clearAllData()">Reset Everything</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/config.js"></script>

  <script>
    // put your data here  this info will not work
    //you need to put your firebase config.
    const firebaseConfig = {
            apiKey: "AIzaSyC1bxz29svF9y_5V-8VJz0NaMsIzVOAwhI",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "online-voting-b970f",
            storageBucket: "online-voting-b970f.firebasestorage.app",
            messagingSenderId: "784746686625",
            appId: "1:784746686625:web:eb6a565d11d7240d48a8e0"
        };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const SECRET_HASH = "158a323a7ba44870f23d96f1516dd70aa48e9a72db4ebb026b0a89e212a208ab";

    async function checkPass() {
      const val = document.getElementById('passCode').value;
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
      const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');

      if (hash === SECRET_HASH) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        startDashboard();
      } else {
        document.getElementById('errorMsg').innerText = "Wrong code!";
      }
    }

    let chart = null;

    function startDashboard() {
      initChart();
      syncData();
      syncTips();
    }

    function initChart() {
      const ctx = document.getElementById('myChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: suspectOptions.map(s => s.name),
          datasets: [{
            label: 'Votes',
            data: suspectOptions.map(() => 0),
            backgroundColor: '#c35a3a'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }

    function syncData() {
      database.ref('votes').on('value', snap => {
        const data = snap.val() || {};
        const counts = suspectOptions.map(s => data[s.id] || 0);
        chart.data.datasets[0].data = counts;
        chart.update();

        const total = counts.reduce((a, b) => a + b, 0);
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-item"><strong>${total}</strong> total votes</div>
        `;
      });
    }

    function syncTips() {
      database.ref('feedback').on('child_added', snap => {
        const msg = snap.val();
        const list = document.getElementById('evidenceList');
        const div = document.createElement('div');
        div.className = 'tip';
        div.innerHTML = `<strong>${msg.option}:</strong> ${msg.feedback}`;
        list.prepend(div);
      });
    }

    function clearAllData() {
      if (confirm("Delete all data?")) {
        database.ref('votes').remove().then(() => {
          database.ref('feedback').remove().then(() => {
            alert("Data cleared!");
            location.reload();
          });
        });
      }
    }
  </script>
</body>
</html>
